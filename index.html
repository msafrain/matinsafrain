<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Matin Safrain — marketing portfolio and the broader works of mSafrain."
  />
  <meta name="theme-color" content="#0a246a" />
  <title>Matin Safrain</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="desktop">
    <section class="window" aria-label="Matin Safrain directory">
      <header class="title-bar">
        <div class="title-bar__identity">
          <span class="computer-icon" aria-hidden="true">🖥️</span>
          <span>C:\MATIN_SAFRAIN</span>
        </div>

        <div class="window-controls" aria-hidden="true">
          <button type="button" tabindex="-1">_</button>
          <button type="button" tabindex="-1">□</button>
          <button type="button" class="close" tabindex="-1">×</button>
        </div>
      </header>

      <nav class="menu-bar" aria-label="Decorative application menu">
        <span><u>F</u>ile</span>
        <span><u>E</u>dit</span>
        <span><u>V</u>iew</span>
        <span>F<u>a</u>vorites</span>
        <span><u>T</u>ools</span>
        <span><u>H</u>elp</span>
      </nav>

      <div class="toolbar" aria-hidden="true">
        <button type="button">← Back</button>
        <button type="button">→</button>
        <button type="button">↑</button>
        <span class="toolbar-divider"></span>
        <button type="button">🔍 Search</button>
        <button type="button">📁 Folders</button>
      </div>

      <div class="address-bar">
        <label for="address">Address</label>
        <div class="address-input">
          <span aria-hidden="true">📁</span>
          <input
            id="address"
            value="C:\Matin Safrain"
            aria-label="Current directory"
            readonly
          />
        </div>
        <button class="go-button" type="button" aria-hidden="true">Go</button>
      </div>

      <div class="workspace">
        <aside class="folder-panel" aria-label="Folder tree">
          <div class="panel-heading">
            <span>Folders</span>
            <button type="button" aria-label="Close folder panel">×</button>
          </div>

          <div class="tree">
            <div class="tree-item root active">
              <span class="tree-guide">−</span>
              <span aria-hidden="true">🖥️</span>
              <span>Matin Safrain</span>
            </div>

            <a
              class="tree-item nested"
              href="https://ways-beam-dx0.craft.me/J1fGgdH0E1h4Rv"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="tree-guide">└</span>
              <span aria-hidden="true">📁</span>
              <span>Marketing Portfolio</span>
            </a>

            <a
              class="tree-item nested"
              href="https://msafrain.com"
              target="_blank"
              rel="noopener noreferrer"
            >
              <span class="tree-guide">└</span>
              <span aria-hidden="true">📁</span>
              <span>mSafrain</span>
            </a>
          </div>
        </aside>

        <section class="content-panel" aria-label="Directory contents">
          <div class="details-view" role="table" aria-label="Matin Safrain folders">
            <div class="details-header" role="row">
              <div class="name-column" role="columnheader">Name</div>
              <div class="type-column" role="columnheader">Type</div>
            </div>

            <a
              class="file-row"
              role="row"
              href="https://ways-beam-dx0.craft.me/J1fGgdH0E1h4Rv"
              target="_blank"
              rel="noopener noreferrer"
              data-status="Opening Marketing Portfolio..."
            >
              <span class="file-name" role="cell">
                <span class="file-icon" aria-hidden="true">📁</span>
                <span>Marketing Portfolio</span>
              </span>
              <span class="file-type" role="cell">TikTok storytelling &amp; creative direction</span>
            </a>

            <a
              class="file-row"
              role="row"
              href="https://msafrain.com"
              target="_blank"
              rel="noopener noreferrer"
              data-status="Opening mSafrain..."
            >
              <span class="file-name" role="cell">
                <span class="file-icon" aria-hidden="true">📁</span>
                <span>mSafrain</span>
              </span>
              <span class="file-type" role="cell">Art, vision, ideas &amp; writings</span>
            </a>
          </div>
        </section>
      </div>

      <footer class="status-bar">
        <span id="status-message">2 object(s)</span>
        <span>matinsafrain.com</span>
      </footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
